<!DOCTYPE html>
<html>
<head>
  <title>Path Selection Experiment</title>
  <script src="jspsych/jspsych.js"></script>
  <script src="jspsych/plugin-html-keyboard-response.js"></script>
  <script src="jspsych/plugin-html-button-response.js"></script>
  <script src="jspsych/plugin-animation.js"></script>
  <script src="jspsych/plugin-preload.js"></script>
  <link href="jspsych/jspsych.css" rel="stylesheet" type="text/css" />
  <style>
    .grid-container {
        display: grid;
        grid-template-columns: repeat(11, 40px); /* Fixed cell width */
        grid-template-rows: repeat(11, 40px); /* Fixed cell height */
        gap: 2px;
    }

    .grid-cell {
        border: 1px solid #000;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: white; /* Default background for non-path cells */
    }

    .start, .goal {
        font-weight: bold;
        z-index: 1; /* Ensure text is visible on top of the background */
    }

    .observed-cost.start, .observed-cost.goal {
        background-color: red; /* Red for high cost */
    }

    .observed-no-cost.start, .observed-no-cost.goal {
        background-color: grey; /* Grey for low cost */
    }

    .blue-path {
        color: blue; /* Blue star for path A */
    }

    .green-path {
        color: green; /* Green star for path B */
    }

    .observed-cost {
        background-color: red; /* Red for high cost */
    }

    .observed-no-cost {
        background-color: grey; /* Grey for low cost */
    }

    .avatar {
        background-color: yellow;
    }

    .choice-container {
        display: flex;
        justify-content: center;
        margin-top: 20px;
    }

    .choice-box {
        width: 150px;
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 10px;
        font-weight: bold;
        border: 2px solid #000;
    }

    .blue-path.choice-box {
        background-color: blue;
        color: white;
    }

    .green-path.choice-box {
        background-color: green;
        color: white;
    }
  </style>
  <!-- Import the experiment.js script -->
  <script src="experiment.js"></script>
</head>
<body></body>
</html>
