<!DOCTYPE html>
<html>
<head>
  <title>Path Selection Experiment</title>
  <script src="jspsych/jspsych.js"></script>
  <script src="jspsych/plugin-html-keyboard-response.js"></script>
  <script src="jspsych/plugin-html-button-response.js"></script>
  <script src="jspsych/plugin-animation.js"></script>
  <script src="jspsych/plugin-preload.js"></script>
  <link href="jspsych/jspsych.css" rel="stylesheet" type="text/css" />
  <style>

    .grid-cell {
        border: 1px solid #000;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: white; /* Default background for non-path cells */
    }

    .start, .goal {
        font-weight: bold;
    }

    .blue-path {
        color: blue; /* Blue star for path A */
    }

    .green-path {
        color: green; /* Green star for path B */
    }

    .observed-cost {
        background-color: red; /* Red for high cost */
    }

    .observed-no-cost {
        background-color: grey; /* Grey for low cost */
    }

    .avatar {
        background-color: yellow;
    }

    .choice-container {
        display: flex;
        justify-content: center;
        margin-top: 20px;
        height: 60px; /* Fixed height to prevent layout shifts */
    }

    .choice-box {
        width: 150px;
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 10px;
        font-weight: bold;
        border: 2px solid #000;
        position: relative; /* Enable positioning context */
    }

    .grid-container {
        display: grid;
        grid-template-columns: repeat(11, 40px);
        grid-template-rows: repeat(11, 40px);
        gap: 2px;
        justify-content: center;
        margin-top: 0px;
        position: relative;
        height: 450px; /* Fixed height to prevent shifts */
    }

    .blue-path.choice-box {
        background-color: blue;
        color: white;
    }

    .green-path.choice-box {
        background-color: green;
        color: white;
    }

    .cost-display {
        position: absolute;
        right: 20px;
        top: 100px;
        font-size: 24px;
        color: red;
        font-weight: bold;
    }
    .cost-value {
        font-size: 32px;
    }

    .cost-display-container {
        display: flex;
        flex-direction: column; /* Stack items vertically */
        align-items: center;
        text-align: center;
        margin-bottom: 5px; /* Reduce spacing above grid */
        height: 80px; /* ✅ Fixed height to prevent shifting */
    }

    .cost-total {
        font-size: 22px;
        color: black;
        font-weight: bold;
        margin: 0px; /* ✅ Remove default margin */
        line-height: 1.2; /* ✅ Reduce spacing between lines */
    }

    .cost-trial {
        font-size: 22px;
        color: red;
        font-weight: bold;
        margin: 0px; /* ✅ Remove extra margin */
        line-height: 1.2; /* ✅ Reduce spacing */
        transition: transform 0.5s ease-in-out;
    }

    .hidden {
        visibility: hidden; /* ✅ Keep space reserved instead of removing element */
    }



  </style>
  <!-- Import the experiment.js script -->
  <script src="experiment.js"></script>
</head>
<body></body>
</html>
