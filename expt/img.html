<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Galaxy & Filter</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            --bg-filter: none;
            --bg-image: url('assets/galaxies/galaxy-1.jpg'); /* Default image */
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: var(--bg-image); /* Dynamically set image */
            background-size: cover;
            background-position: center;
            filter: var(--bg-filter);
            z-index: -1;
        }

        .text {
            font-family: Arial, sans-serif;
            font-size: 24px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="text">Random galaxies with filters...</div>

    <script>
        const galaxyImages = [
            "assets/galaxies/galaxy-1.jpg",
            "assets/galaxies/galaxy-2.jpg",
            "assets/galaxies/galaxy-3.jpg",
            "assets/galaxies/galaxy-4.jpg",
            "assets/galaxies/galaxy-5.jpg",
            "assets/galaxies/galaxy-6.jpg"
        ];

        const filters = [
            "hue-rotate(90deg)", 
            "hue-rotate(180deg)", 
            "hue-rotate(270deg)", 
            "brightness(1.2) contrast(1.2)", 
            "saturate(2)", 
            "grayscale(50%)", 
            "sepia(50%)"
        ];

        let lastImageIndex = -1;
        let lastFilterIndex = -1;

        function getRandomIndex(array, lastIndex) {
            let newIndex;
            do {
                newIndex = Math.floor(Math.random() * array.length);
            } while (newIndex === lastIndex);
            return newIndex;
        }

        function updateBackground() {
            // Select a new image that is not the same as the last one
            const imageIndex = getRandomIndex(galaxyImages, lastImageIndex);
            lastImageIndex = imageIndex;
            const randomImage = galaxyImages[imageIndex];

            // Select a new filter that is not the same as the last one
            const filterIndex = getRandomIndex(filters, lastFilterIndex);
            lastFilterIndex = filterIndex;
            const randomFilter = filters[filterIndex];

            // Apply the new image and filter
            document.body.style.setProperty('--bg-image', `url('${randomImage}')`);
            document.body.style.setProperty('--bg-filter', randomFilter);

            console.log("Applied image:", randomImage, " | Filter:", randomFilter);
        }

        // Change the background every 3 seconds
        setInterval(updateBackground, 3000);

        // Apply the first change immediately
        updateBackground();
    </script>
</body>
</html>
